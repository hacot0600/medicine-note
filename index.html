<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6158">
  <title>くすりノート</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">医療職向け学習メモ</p>
        <h1>くすりノート</h1>
      </div>
      <span id="saveStatus" class="save-status" aria-live="polite">保存済み</span>
    </header>

    <aside class="safety-note">
      <strong>学習用</strong>
      <span>実務では最新の電子添文・院内手順を確認してください。患者情報は入力しないでください。</span>
    </aside>

    <main>
      <section id="learnView" class="view active" aria-labelledby="learnTitle">
        <div class="section-heading">
          <div>
            <p class="section-kicker">LEARN</p>
            <h2 id="learnTitle">覚える</h2>
          </div>
          <button id="quickAddButton" class="primary compact" type="button">薬を追加</button>
        </div>

        <div class="search-row">
          <label class="search-box">
            <span class="sr-only">薬剤を検索</span>
            <input id="searchInput" type="search" placeholder="薬の名前・疾患・作用で検索">
          </label>
          <button id="favoriteFilter" class="icon-button" type="button" aria-pressed="false" title="お気に入りのみ">☆</button>
        </div>

        <div class="filter-row" role="group" aria-label="習得状態で絞り込み">
          <button class="filter-chip active" type="button" data-status="all">すべて</button>
          <button class="filter-chip" type="button" data-status="new">未学習</button>
          <button class="filter-chip" type="button" data-status="learning">学習中</button>
          <button class="filter-chip" type="button" data-status="mastered">覚えた</button>
        </div>

        <div id="recordSummary" class="record-summary"></div>
        <div id="drugList" class="drug-list"></div>
      </section>

      <section id="quizView" class="view" aria-labelledby="quizTitle">
        <div class="section-heading">
          <div>
            <p class="section-kicker">CHECK</p>
            <h2 id="quizTitle">確認する</h2>
          </div>
        </div>

        <div id="quizSetup" class="panel quiz-setup">
          <label class="field-label" for="quizField">確認する項目</label>
          <select id="quizField"></select>
          <label class="toggle-line">
            <input id="quizMastered" type="checkbox">
            <span>「覚えた」薬も出題する</span>
          </label>
          <button id="startQuizButton" class="primary full" type="button">確認を始める</button>
        </div>

        <div id="quizEmpty" class="empty-state hidden"></div>

        <div id="quizCard" class="quiz-card hidden">
          <div class="quiz-progress">
            <span id="quizCount"></span>
            <div class="progress-track"><span id="quizProgress"></span></div>
          </div>
          <p id="quizPrompt" class="quiz-prompt"></p>
          <h3 id="quizDrugName"></h3>
          <div id="quizAnswer" class="quiz-answer hidden"></div>
          <button id="revealAnswerButton" class="primary full" type="button">答えを見る</button>
          <div id="quizJudge" class="judge-row hidden">
            <button id="retryButton" class="secondary" type="button">もう一度</button>
            <button id="correctButton" class="success" type="button">覚えていた</button>
          </div>
          <button id="endQuizButton" class="text-button" type="button">確認を終了</button>
        </div>

        <div id="quizResult" class="panel hidden"></div>
      </section>

      <section id="editView" class="view" aria-labelledby="editTitle">
        <div class="section-heading">
          <div>
            <p class="section-kicker">EDIT</p>
            <h2 id="editTitle">編集する</h2>
          </div>
        </div>

        <div class="subtabs" role="tablist" aria-label="編集メニュー">
          <button class="subtab active" type="button" data-edit-panel="recordsPanel">薬剤</button>
          <button class="subtab" type="button" data-edit-panel="fieldsPanel">項目</button>
          <button class="subtab" type="button" data-edit-panel="dataPanel">データ</button>
        </div>

        <div id="recordsPanel" class="edit-panel active">
          <form id="drugForm" class="panel form-panel">
            <div class="form-title-row">
              <h3 id="formTitle">薬剤を追加</h3>
              <button id="cancelEditButton" class="text-button hidden" type="button">編集をやめる</button>
            </div>
            <div id="dynamicFields" class="dynamic-fields"></div>
            <button class="primary full" type="submit">保存する</button>
          </form>
          <div class="list-heading">
            <h3>登録済み</h3>
            <span id="editRecordCount"></span>
          </div>
          <div id="editDrugList" class="edit-drug-list"></div>
        </div>

        <div id="fieldsPanel" class="edit-panel">
          <div class="panel">
            <h3>項目を追加</h3>
            <form id="fieldForm" class="inline-form">
              <label>
                <span>項目名</span>
                <input id="newFieldLabel" type="text" maxlength="40" placeholder="例：禁忌・注意事項" required>
              </label>
              <label>
                <span>入力形式</span>
                <select id="newFieldType">
                  <option value="textarea">複数行</option>
                  <option value="text">1行</option>
                  <option value="number">数値</option>
                  <option value="date">日付</option>
                  <option value="url">URL</option>
                </select>
              </label>
              <label class="toggle-line">
                <input id="newFieldQuiz" type="checkbox" checked>
                <span>確認問題に使う</span>
              </label>
              <button class="primary full" type="submit">項目を追加</button>
            </form>
          </div>
          <p class="helper-text">「薬の名前」以外は、名称・形式・出題設定・並び順を変更できます。</p>
          <div id="fieldList" class="field-list"></div>
        </div>

        <div id="dataPanel" class="edit-panel">
          <div class="panel data-actions">
            <h3>バックアップ</h3>
            <p>端末の故障・機種変更・ブラウザーのデータ消去に備えて、定期的に保存してください。</p>
            <button id="exportButton" class="primary full" type="button">JSONを書き出す</button>
            <label class="secondary full file-label">
              JSONを読み込む
              <input id="importInput" type="file" accept="application/json,.json">
            </label>
          </div>
          <div class="panel danger-zone">
            <h3>データの初期化</h3>
            <p>登録した薬剤、項目、確認履歴をすべて削除します。</p>
            <button id="resetButton" class="danger full" type="button">すべて初期化</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="メインメニュー">
      <button class="nav-item active" type="button" data-view="learnView">
        <span class="nav-symbol" aria-hidden="true">A</span>
        <span>覚える</span>
      </button>
      <button class="nav-item" type="button" data-view="quizView">
        <span class="nav-symbol" aria-hidden="true">?</span>
        <span>確認</span>
      </button>
      <button class="nav-item" type="button" data-view="editView">
        <span class="nav-symbol" aria-hidden="true">+</span>
        <span>編集</span>
      </button>
    </nav>
  </div>

  <dialog id="detailDialog" class="detail-dialog">
    <div id="detailContent"></div>
    <button id="closeDetailButton" class="secondary full" type="button">閉じる</button>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
